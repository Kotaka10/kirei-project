services:
  frontend:
    build: ./frontend #このパスのDockerfileからコンテナ作る
    ports:
      - "5173:5173" #localhost:5173 → コンテナ:5173
    volumes:
      - ./frontend:/app #ローカルのfrontendフォルダ → コンテナの /app に同期 ←つまりコード変更がリアルタイムで反映される
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
  
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on: #DBコンテナが先に起動する※完全に接続可能になる保証ではない
      - db
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: kirei_db
    command: npx tsx server.ts

  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: kirei_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image:  phpmyadmin/phpmyadmin
    environment:
      PMA_HOST: db
    ports:
      - "8080:80"

volumes:
  db_data: